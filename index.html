<!DOCTYPE html>
<html lang="en">
<!-- put template here -->
 <template id="news-item-template">
    <div class="card col-8">
        <div class="card-body">
            <h5 class="card-title"></h5>
            <p class="card-text"></p>
    </div>
 </template>
<head></head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <script src="index.js"></script>
    <title>Dynamic News</title>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
  <span class="navbar-brand mb-0 h1">Dynamic News</span>
</nav>
<div class="form-group">
    <input class="form-control" type="text" placeholder="Type the headline here" id="user-headline-input">
  </div>
<div class="form-group">
    <label for="user-content-textarea">What happened?</label>
    <textarea class="form-control" placeholder="Type more details about the story here" id="user-content-textarea" rows="3"></textarea>
  </div>
    <button type="button" class="btn btn-outline-success form-group" onclick="handleSubmit()">Submit</button>
    <div class="row" id="news-list"></div>
   
</body>
</html>
